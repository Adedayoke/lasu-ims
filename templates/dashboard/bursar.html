<div class="page-header">
  <div>
    <h1 class="page-title">Financial Overview</h1>
    <p class="page-subtitle">Asset valuation and write-off summary</p>
  </div>
  <a href="{% url 'reports:export_centre' %}" class="btn btn-secondary">Export Report</a>
</div>

<div class="stats-grid">
  <div class="stat-card"><div class="stat-card-icon success"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg></div><div class="stat-card-body"><div class="stat-card-value">{{ total_value|naira:0 }}</div><div class="stat-card-label">Total Asset Value</div></div></div>
  <div class="stat-card"><div class="stat-card-icon danger"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 00-3.7-3.7 48.678 48.678 0 00-7.324 0 4.006 4.006 0 00-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3l-3-3m-12 3c0 1.232.046 2.453.138 3.662a4.006 4.006 0 003.7 3.7 48.657 48.657 0 007.324 0 4.006 4.006 0 003.7-3.7c.017-.22.032-.441.046-.662M4.5 12l3 3m-3-3l-3 3"/></svg></div><div class="stat-card-body"><div class="stat-card-value">{{ condemned_value|naira:0 }}</div><div class="stat-card-label">Write-offs (Condemned)</div></div></div>
  <div class="stat-card"><div class="stat-card-icon accent"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/></svg></div><div class="stat-card-body"><div class="stat-card-value">{{ total_assets }}</div><div class="stat-card-label">Total Assets</div></div></div>
  <div class="stat-card"><div class="stat-card-icon info"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg></div><div class="stat-card-body"><div class="stat-card-value">{{ assets_this_year }}</div><div class="stat-card-label">Added This Year</div><div class="stat-card-change text-secondary">{{ assets_last_year }} last year</div></div></div>
</div>

<div class="card">
  <div class="card-header"><div class="card-title">Asset Value by Department</div></div>
  <div class="card-body">
    <div class="chart-container">
      <canvas id="deptChart"></canvas>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
(function(){
  const ctx = document.getElementById('deptChart');
  if (!ctx) return;
  const labels = [{% for d in dept_values %}"{{ d.name }}"{% if not forloop.last %},{% endif %}{% endfor %}];
  const data = [{% for d in dept_values %}{{ d.asset_value|default:0 }}{% if not forloop.last %},{% endif %}{% endfor %}];
  new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Value (₦)', data, backgroundColor: 'rgba(79,110,247,0.65)', borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b92a9', font: { size: 11 } } }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b92a9', font: { size: 11 } } } }
    }
  });
})();
</script>
