{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — LASU IMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/components.css' %}">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
  <script src="{% static 'js/theme.js' %}"></script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo"><div class="login-logo-mark">LI</div></div>
    <h1 class="login-heading">Set new password</h1>
    {% if validlink %}
    <form method="post" style="margin-top:24px;">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">{{ field.label }}</label>
        <input type="password" name="{{ field.html_name }}" class="form-control" placeholder="{{ field.label }}">
        {% if field.errors %}<span class="form-error">{{ field.errors|join:', ' }}</span>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Set Password</button>
    </form>
    {% else %}
    <div class="alert alert-danger" style="margin-top:24px;">This reset link is invalid or has expired. <a href="{% url 'accounts:password_reset' %}">Request a new one.</a></div>
    {% endif %}
  </div>
</div>
</body>
</html>
