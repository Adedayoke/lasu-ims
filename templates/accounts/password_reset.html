{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — LASU IMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/components.css' %}">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
  <script src="{% static 'js/theme.js' %}"></script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">LI</div>
      <div class="login-logo-text">
        <span class="login-logo-title">LASU IMS</span>
        <span class="login-logo-sub">Password Reset</span>
      </div>
    </div>
    <h1 class="login-heading">Reset your password</h1>
    <p class="login-sub">Enter your email address and we'll send you a reset link.</p>
    <form method="post" style="margin-top:24px;">
      {% csrf_token %}
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" placeholder="you@lasu.edu.ng" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Send Reset Link</button>
    </form>
    <div style="margin-top:20px;text-align:center;">
      <a href="{% url 'accounts:login' %}" class="text-secondary" style="font-size:13px;">Back to sign in</a>
    </div>
  </div>
</div>
</body>
</html>
