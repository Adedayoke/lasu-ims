{% extends "base.html" %}
{% block title %}{{ action }} Department{% endblock %}
{% block breadcrumb %}<span class="sep">/</span><a href="{% url 'admin_panel:departments' %}">Departments</a><span class="sep">/</span><span class="current">{{ action }}</span>{% endblock %}

{% block content %}
<div class="page-header"><div><h1 class="page-title">{{ action }} Department</h1></div></div>

<div class="card" style="max-width:520px;">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">Name <span class="required">*</span></label>
        <input type="text" name="name" value="{{ dept.name|default:'' }}" class="form-control" required>
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">Code <span class="required">*</span></label>
        <input type="text" name="code" value="{{ dept.code|default:'' }}" class="form-control" required placeholder="e.g. ENG">
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">Faculty</label>
        <input type="text" name="faculty" value="{{ dept.faculty|default:'' }}" class="form-control">
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label class="form-label">Head of Department</label>
        <select name="hod" class="form-select">
          <option value="">— None —</option>
          {% for user in users %}
          <option value="{{ user.pk }}" {% if dept and dept.hod == user %}selected{% endif %}>{{ user.get_full_name|default:user.username }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">{{ action }} Department</button>
        <a href="{% url 'admin_panel:departments' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
