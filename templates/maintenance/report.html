{% extends "base.html" %}
{% block title %}Report Maintenance{% endblock %}
{% block breadcrumb %}<span class="sep">/</span><a href="{% url 'maintenance:list' %}">Maintenance</a><span class="sep">/</span><span class="current">Report Issue</span>{% endblock %}

{% block content %}
<div class="page-header"><div><h1 class="page-title">Report Maintenance Issue</h1></div></div>

<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="confirm" value="1">
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">Asset <span class="required">*</span></label>
        <select name="asset_id" class="form-select" required>
          <option value="">— Select Asset —</option>
          {% for a in assets %}
          <option value="{{ a.asset_id }}" {% if asset and a.asset_id == asset.asset_id %}selected{% endif %}>{{ a.asset_id }} — {{ a.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">Issue Description <span class="required">*</span></label>
        <textarea name="issue_description" class="form-control" rows="4" placeholder="Describe the problem in detail…" required></textarea>
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label class="form-label">Assigned Technician</label>
        <input type="text" name="assigned_technician" class="form-control" placeholder="Name of technician / vendor">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Report Issue</button>
        <a href="{% url 'maintenance:list' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
